events {}

http {
    # Staging-only http-szintű config (pl. AI bot user-agent map) – üres production-ben
    include /etc/nginx/conf.d/http-extra/*.conf;

    upstream frontend {
        server frontend:80;
    }

    upstream offerservice {
        server offerservice:3000;
    }

    server {
        listen 80;
        server_name _;

        server_tokens off;

        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Staging-only server-szintű config (basic auth, noindex, AI bot tiltás) – üres production-ben
        include /etc/nginx/conf.d/server-extra/*.conf;

        # API traffic → offerservice
        location /api/ {
            proxy_set_header Host offerservice;
            proxy_pass http://offerservice/;
            proxy_read_timeout 60s;
        }

        # Auth / OAuth flow → offerservice
        location /auth/ {
            proxy_set_header Host offerservice;
            proxy_pass http://offerservice/auth/;
            proxy_read_timeout 60s;
        }

        # Health endpoint of offerservice (gateway-level probe)
        location /health {
            proxy_set_header Host offerservice;
            proxy_pass http://offerservice/health;
        }

        # Everything else → React frontend
        location / {
            proxy_set_header Host frontend;
            proxy_pass http://frontend;
        }
    }
}
