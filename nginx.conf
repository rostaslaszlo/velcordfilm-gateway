events {}

http {
    proxy_cache_path /tmp/nginx-blog-cache
        levels=1:2
        keys_zone=blog_cache:1m
        max_size=10m
        inactive=1h;

    # Staging-only http-szintű config (pl. AI bot user-agent map) – üres production-ben
    include /etc/nginx/conf.d/http-extra/*.conf;

    upstream frontend {
        server frontend:80;
    }

    upstream offerservice {
        server offerservice:3000;
    }

    server {
        listen 80;
        server_name _;

        server_tokens off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Staging-only server-szintű config (basic auth, noindex, AI bot tiltás) – üres production-ben
        include /etc/nginx/conf.d/server-extra/*.conf;

        # Blog API – nginx cache, előbb mint az általános /api/ blokk
        location /api/blog/ {
            proxy_cache            blog_cache;
            proxy_cache_key        "$scheme$request_method$host$request_uri";
            proxy_cache_valid      200 10m;
            proxy_cache_valid      404 1m;
            proxy_cache_lock       on;
            proxy_cache_use_stale  error timeout updating;
            proxy_cache_background_update on;
            add_header             X-Cache-Status $upstream_cache_status;

            proxy_pass http://offerservice/blog/;
            proxy_read_timeout 60s;
        }

        # API traffic → offerservice
        location /api/ {
            proxy_pass http://offerservice/;
            proxy_read_timeout 60s;
        }

        # Auth / OAuth flow → offerservice
        location /auth/ {
            proxy_pass http://offerservice/auth/;
            proxy_read_timeout 60s;
        }

        # Health endpoint of offerservice (gateway-level probe)
        location /health {
            proxy_pass http://offerservice/health;
        }

        # Everything else → React frontend
        location / {
            proxy_pass http://frontend;
        }
    }
}
