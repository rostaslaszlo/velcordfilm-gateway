    ~*Claude-Web            1;
    ~*Claude-User           1;
    ~*anthropic-ai          1;
    ~*CCBot                 1;
    ~*Google-Extended       1;
    ~*GoogleOther           1;
    ~*Bytespider            1;
    ~*PerplexityBot         1;
    ~*Perplexity-User       1;
    ~*Amazonbot             1;
    ~*Applebot-Extended     1;
    ~*Diffbot               1;
    ~*FacebookBot           1;
    ~*meta-externalagent    1;
    ~*Meta-ExternalAgent    1;
    ~*Omgilibot             1;
    ~*Timpibot              1;
    ~*YouBot                1;
    ~*ImagesiftBot          1;
    ~*Webzio-Extended       1;
}
